name: 祭り告知 LINE 通知

on:
  schedule:
    # 毎週月曜 8:00 JST (= UTC 日曜 23:00)
    - cron: '0 23 * * 0'
    # 毎日 18:00 JST (= UTC 09:00)
    - cron: '0 9 * * *'
    # 毎日 8:00 JST (= UTC 前日 23:00)
    - cron: '0 23 * * *'

  # 手動実行も可能
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード (today / tomorrow / weekly)'
        required: true
        default: 'today'
        type: choice
        options:
          - today
          - tomorrow
          - weekly

env:
  TZ: Asia/Tokyo

jobs:
  weekly:
    name: 今週まとめ送信（毎週月曜 8:00）
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly' || github.event.schedule == '0 23 * * 0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 今週の祭りを送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}
        run: node scripts/notify.js weekly

  tomorrow:
    name: 明日の祭り告知（毎日 18:00）
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'tomorrow' || github.event.schedule == '0 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 明日の祭りを送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}
        run: node scripts/notify.js tomorrow

  today:
    name: 当日朝の祭り告知（毎日 8:00）
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'today' || github.event.schedule == '0 23 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 今日の祭りを送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}
        run: node scripts/notify.js today
