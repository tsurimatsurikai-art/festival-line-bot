name: 祭り告知 LINE 通知

on:
  schedule:
    # 毎日 18:00 JST (= UTC 09:00) → 明日の祭り告知
    - cron: '0 9 * * *'
    # 毎日 10:07 JST (= UTC 01:07) → 開催約半年前〜当日の祭りを一覧告知
    - cron: '7 1 * * *'

  # 手動実行も可能にする
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード (today / tomorrow / countdown)'
        required: true
        default: 'countdown'
        type: choice
        options:
          - today
          - tomorrow
          - countdown
      dry_run:
        description: 'ON にすると LINE は送らず、スプレッドシートの該当件数だけ確認（トークン検証なし）'
        required: false
        default: false
        type: boolean

env:
  TZ: Asia/Tokyo
  # 手動実行かつ dry_run のときだけ 1（スケジュールでは常に空＝送信する）
  LINE_NOTIFY_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && '1' || '' }}

jobs:
  today:
    name: 当日の祭り告知（手動テスト用）
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'today'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: LINE トークン検証（無効ならここで失敗）
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_NOTIFY_DRY_RUN: ${{ env.LINE_NOTIFY_DRY_RUN }}
        run: |
          if [ -d festival-line-bot ]; then cd festival-line-bot; fi
          node scripts/verify-line-token.js
      - name: 今日の祭りを送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}
        run: |
          if [ -d festival-line-bot ]; then cd festival-line-bot; fi
          node scripts/notify.js today

  tomorrow:
    name: 明日の祭り告知（毎日 18:00）
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'tomorrow' || github.event.schedule == '0 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: LINE トークン検証（無効ならここで失敗）
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_NOTIFY_DRY_RUN: ${{ env.LINE_NOTIFY_DRY_RUN }}
        run: |
          if [ -d festival-line-bot ]; then cd festival-line-bot; fi
          node scripts/verify-line-token.js
      - name: 明日の祭りを送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}
        run: |
          if [ -d festival-line-bot ]; then cd festival-line-bot; fi
          node scripts/notify.js tomorrow

  countdown:
    name: 半年前からの祭り告知（毎日 10:07）
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'countdown' || github.event.schedule == '0 23 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 依存パッケージをインストール
        run: |
          if [ -d festival-line-bot ]; then cd festival-line-bot; fi
          npm install
      - name: カウントダウン画像を生成
        run: |
          if [ -d festival-line-bot ]; then cd festival-line-bot; fi
          node scripts/generate-countdown-image.js
      - name: 生成画像を公開URLへアップロード
        id: upload_countdown_image
        run: |
          if [ -d festival-line-bot ]; then cd festival-line-bot; fi
          IMAGE_URL=$(curl -fsS -F "reqtype=fileupload" -F "fileToUpload=@assets/generated/countdown.png" "https://catbox.moe/user/api.php")
          if [ -z "$IMAGE_URL" ]; then
            echo "画像URLの取得に失敗しました"
            exit 1
          fi
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"
          echo "アップロードURL: $IMAGE_URL"
      - name: LINE トークン検証（無効ならここで失敗）
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_NOTIFY_DRY_RUN: ${{ env.LINE_NOTIFY_DRY_RUN }}
        run: |
          if [ -d festival-line-bot ]; then cd festival-line-bot; fi
          node scripts/verify-line-token.js
      - name: カウントダウン告知を送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}
          LINE_NOTIFY_IMAGE_ORIGINAL_URL: ${{ steps.upload_countdown_image.outputs.image_url }}
          LINE_NOTIFY_IMAGE_PREVIEW_URL: ${{ steps.upload_countdown_image.outputs.image_url }}
        run: |
          if [ -d festival-line-bot ]; then cd festival-line-bot; fi
          node scripts/notify.js countdown
